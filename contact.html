<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Freelance</title>
    <meta name="description" content="Get in touch for your next project.">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="glass-nav">
        <nav>
            <a href="index.html" class="logo">f<span>.</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="index.html#promotion">Promotion</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <a href="contact.html" class="btn btn-outline mono">Get Quote</a>
        </nav>
    </header>

    <main>
        <section class="container" style="padding-top: 10rem;">
            <div class="contact-grid">
                <!-- Left side: Info & Illustration -->
                <div class="contact-info">
                    <span class="mono" style="color: var(--accent-color); margin-bottom: 1rem; display: block;">Let's Talk</span>
                    <h2>Got a project in mind?</h2>
                    <p>Whether it's a new logo, a poster for your event, or editing a video, let's create something amazing together.</p>
                    
                    <!-- Abstract geometric illustration replacing image -->
                    <div class="contact-illustration glass" style="height: 300px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
                        <div style="width: 150px; height: 150px; border-radius: 50%; border: 2px solid var(--text-main); position: absolute; top: -20px; left: -20px; opacity: 0.1;"></div>
                        <div style="width: 100px; height: 100px; background-color: var(--accent-color); position: absolute; bottom: 40px; right: 40px; border-radius: 8px; transform: rotate(15deg); opacity: 0.8;"></div>
                        <div style="width: 120px; height: 120px; border-radius: 50%; background-color: var(--text-main); position: absolute; top: 60px; left: 60px;"></div>
                        <i class="fa-regular fa-paper-plane" style="font-size: 3rem; color: white; z-index: 2; position: relative; top: -10px; left: -10px;"></i>
                    </div>

                    <div class="social-links">
                        <a href="#" aria-label="WhatsApp" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                        <a href="#" aria-label="Instagram" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" aria-label="Facebook" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
                    </div>
                </div>

                <!-- Right side: Form -->
                <div class="contact-form glass">
                    <form action="#" method="POST" id="inquiry-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
                        </div>

                        <div class="form-group">
                            <label for="service-select">Service Required</label>
                            <select id="service-select" name="service" class="form-control" required>
                                <option value="" disabled selected>Select a service</option>
                                <option value="Logo Design">Logo Design</option>
                                <option value="Poster Design">Poster Design</option>
                                <option value="Video Editing">Video Editing</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="message">Project Details</label>
                            <textarea id="message" name="message" class="form-control" placeholder="Tell me about your project..." required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Inquiry</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Freelance Portfolio. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
