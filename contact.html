<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | devxign.tech</title>
    <link rel="stylesheet" href="styles.css?v=1.2">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Outfit Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <nav class="container">
            <a href="index.html" class="logo"><img src="Company logo.jpeg" alt="Company Logo"></a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#promotion">Promotion</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <label for="theme-toggle" class="theme">
                    <span class="theme__toggle-wrap">
                        <input id="theme-toggle" class="theme__toggle" type="checkbox" role="switch" name="theme" value="dark">
                        <span class="theme__fill"></span>
                        <span class="theme__icon">
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                        </span>
                    </span>
                </label>
                <a href="contact.html" class="btn btn-primary btn-pill desktop-only">GET QUOTE</a>
                <button class="mobile-menu-btn" aria-label="Menu">⋯</button>
            </div>
        </nav>
        <div class="mobile-dropdown">
            <ul class="mobile-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#promotion">Promotion</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="contact.html" class="btn btn-primary btn-pill mobile-quote-btn">GET QUOTE</a></li>
            </ul>
        </div>
    </header>

    <main style="padding-top: 100px; min-height: 80vh; display: flex; align-items: center;">
        <section id="contact" class="section contact">
            <div class="container contact-container">
                <div class="contact-left">
                    <img src="contact icon.png" alt="Contact Icon" class="contact-icon-img desk-float">
                </div>
                <div class="contact-right">
                    <form class="contact-form" id="contact-form" name="google-sheet-form">
                        <h2>Get in touch</h2>
                        <div class="form-group">
                            <input type="text" name="Name" placeholder="Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="Email" placeholder="Email" required>
                        </div>
                        <div class="form-group">
                            <input type="tel" name="Phone" placeholder="Phone" required>
                        </div>
                        <div class="form-group">
                            <select name="Service" required>
                                <option value="" disabled selected>Service needed</option>
                                <option value="Logo Design">Logo Design</option>
                                <option value="Poster Design">Poster Design</option>
                                <option value="Video Editing">Video Editing</option>
                                <option value="Social Media">Social Media Handling</option>
                                <option value="Website Design">Website Design</option>
                                <option value="Promotions">Promotions</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <textarea name="Message" placeholder="Message" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary submit-btn">Submit</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo"><img src="Company logo.jpeg" alt="Company Logo"></div>
            <div class="footer-nav">
                <a href="index.html#home">Home</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#promotion">Promotion</a>
                <a href="index.html#about">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="footer-social">
                <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2025 devxign.tech</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
